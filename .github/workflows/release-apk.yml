name: Build & Release (APK + AAB)

# Push a tag like v0.2.0 -> builds a signed release APK (sideloading) AND a signed
# release AAB (Play upload), then publishes both as a GitHub Release. Manual runs
# (workflow_dispatch) just build + upload them as run artifacts.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write # required to create the Release

jobs:
  build:
    runs-on: ubuntu-latest
    # Surface the optional keystore secret as an env var so steps can gate on it
    # (the `secrets` context is NOT allowed inside an `if:` condition).
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install JS dependencies
        run: npm ci

      # Release-keystore secrets are OPTIONAL: when absent (early test builds),
      # the decode step is skipped, ANDROID_KEYSTORE_PATH stays unset and the
      # Gradle release config falls back to debug signing — still installable.
      - name: Decode release keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > apps/mobile/android/app/release.keystore
          echo "ANDROID_KEYSTORE_PATH=release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK + AAB
        working-directory: apps/mobile/android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease \
            -PappVersionName="${GITHUB_REF_NAME#v}" \
            -PappVersionCode="${{ github.run_number }}" \
            --no-daemon --stacktrace

      - name: Stage artifacts
        run: |
          APK="$(find apps/mobile/android/app/build/outputs/apk/release -name '*.apk' | head -1)"
          AAB="$(find apps/mobile/android/app/build/outputs/bundle/release -name '*.aab' | head -1)"
          echo "Found APK: $APK"
          echo "Found AAB: $AAB"
          cp "$APK" "forgeai-${GITHUB_REF_NAME}.apk"
          cp "$AAB" "forgeai-${GITHUB_REF_NAME}.aab"
          ls -la forgeai-*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: forgeai-build
          path: |
            forgeai-*.apk
            forgeai-*.aab

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ForgeAI ${{ github.ref_name }}
          files: |
            forgeai-*.apk
            forgeai-*.aab
          generate_release_notes: true
