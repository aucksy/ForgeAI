name: Generate release keystore (one-off)

# Manual, run ONCE: generates a release keystore with the passwords you type into
# the dispatch form, prints the base64 blob into the step log (this repo must be
# used before making the repo public if you care about the blob living in old
# logs — better: run while private, or rotate). Copy the base64 output into the
# ANDROID_KEYSTORE_BASE64 secret, then delete the workflow run.
on:
  workflow_dispatch:
    inputs:
      storepass:
        description: 'Keystore password (also set as ANDROID_KEYSTORE_PASSWORD secret)'
        required: true
      keypass:
        description: 'Key password (also set as ANDROID_KEY_PASSWORD secret)'
        required: true
      alias:
        description: 'Key alias (also set as ANDROID_KEY_ALIAS secret)'
        required: true
        default: 'forgeai'

jobs:
  keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore forgeai-release.keystore \
            -storetype PKCS12 \
            -alias "${{ github.event.inputs.alias }}" \
            -storepass "${{ github.event.inputs.storepass }}" \
            -keypass "${{ github.event.inputs.keypass }}" \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=ForgeAI, OU=Apps, O=SimpleApps, L=Delhi, C=IN"

      - name: Print base64 (copy into ANDROID_KEYSTORE_BASE64 secret)
        run: |
          echo "----- BEGIN KEYSTORE BASE64 -----"
          base64 -w0 forgeai-release.keystore
          echo ""
          echo "----- END KEYSTORE BASE64 -----"
          keytool -list -v -keystore forgeai-release.keystore \
            -storepass "${{ github.event.inputs.storepass }}" | grep -A1 'SHA1:'

      - name: Upload keystore artifact (backup — download and store safely)
        uses: actions/upload-artifact@v4
        with:
          name: forgeai-release-keystore
          path: forgeai-release.keystore
